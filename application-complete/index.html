<style>
  body{background:#f7f9fc;color:var(--ink);}
  .complete-main{min-height:calc(100vh - 68px);display:flex;align-items:center;padding:calc(var(--nav-h) + 64px) 0 88px;}
  .complete-panel{width:min(100%,720px);margin:0 auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:56px 40px;box-shadow:0 18px 54px rgba(12,24,40,.08);}
  .complete-icon{width:68px;height:68px;border-radius:50%;margin:0 auto 24px;background:var(--brand-50);display:flex;align-items:center;justify-content:center;color:var(--brand);}
  .complete-icon svg{width:34px;height:34px;stroke:currentColor;}
  .complete-panel h1{font-size:34px;line-height:1.25;font-weight:800;letter-spacing:-.02em;}
  .complete-panel p{margin:16px auto 0;max-width:520px;color:var(--muted);font-size:17px;line-height:1.75;word-break:keep-all;}
  .complete-meta{display:none;margin:28px auto 0;padding:14px 18px;border-radius:10px;background:var(--paper);color:var(--muted);font-size:14px;font-weight:600;width:max-content;max-width:100%;}
  .complete-actions{margin-top:34px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
  .complete-actions .btn{height:48px;padding:0 22px;border-radius:10px;font-size:15px;}
  .complete-actions .btn.line{background:#fff;}
  @media(max-width:640px){
    .complete-main{padding:calc(var(--nav-h) + 36px) 18px 64px;}
    .complete-panel{padding:42px 24px;border-radius:14px;}
    .complete-panel h1{font-size:28px;}
    .complete-panel p{font-size:15px;}
    .complete-actions{flex-direction:column;}
    .complete-actions .btn{width:100%;}
  }
</style>
</head>
<body>
<div data-site-nav></div>
<script src="/assets/site-layout.js?v=20260716-admin-access-3"></script>

<main class="complete-main">
  <section class="complete-panel" aria-labelledby="completeTitle">
    <div class="complete-icon" aria-hidden="true">
      <svg fill="none" stroke-width="2.4" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1 id="completeTitle">강연 신청이 완료되었습니다</h1>
    <p>신청해 주셔서 감사합니다. 담당자가 신청 내용을 확인한 뒤 안내 문자를 보내드릴 예정입니다.</p>
    <div class="complete-meta" id="completeMeta"></div>
    <div class="complete-actions">
      <a class="btn" href="/course-free/">다른 강연 보기</a>
      <a class="btn line" href="/">홈으로 이동</a>
    </div>
  </section>
</main>

<div data-site-footer></div>
<script>window.AiLeadersLayout && window.AiLeadersLayout.renderFooter();</script>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var payload = {};
  try {
    payload = JSON.parse(sessionStorage.getItem('aiLeadersLastApplication') || '{}') || {};
  } catch (error) {
    payload = {};
  }
  var courseId = payload.courseId || params.get('courseId') || '';
  var courseCode = payload.courseCode || params.get('courseCode') || '';
  var courseTitle = payload.courseTitle || params.get('courseTitle') || '';
  var courseType = payload.courseType || params.get('courseType') || '';
  var meta = document.getElementById('completeMeta');
  if (courseTitle) {
    meta.textContent = '신청 강연: ' + courseTitle;
    meta.style.display = 'block';
  }
  if (location.search && history.replaceState) {
    history.replaceState(null, document.title, '/application-complete/');
  }
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: 'lecture_application_complete',
    course_id: courseId,
    course_code: courseCode,
    course_title: courseTitle,
    course_type: courseType
  });
  if (typeof gtag === 'function') {
    gtag('event', 'lecture_application_complete', {
      course_id: courseId,
      course_code: courseCode,
      course_title: courseTitle,
      course_type: courseType
    });
  }
})();
</script>
<script src="/assets/mobile-nav.js"></script>
</body>
</html>
